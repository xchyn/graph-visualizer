<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Visualizer</title>

<!--
  Graph Visualizer — Interactive Planar Graph Construction Tool
  Author: Xinying Chyn
  Repository: https://github.com/xchyn/graph-visualizer
-->

<style>
:root{
  --bg:#f5f5f5;--bg2:#fff;--bg3:#e8e8e8;
  --fg:#333;--fg2:#666;--fg3:#999;
  --border:#ccc;--border2:#ddd;
  --node-fill:#d0e4f5;--node-stroke:#4a90c4;--node-text:#1a5a8a;
  --node-hover:#b8d4ea;--node-src:#4a90c4;--node-src-stroke:#7bb8e8;
  --node-sel:#f0c040;--node-sel-stroke:#c89a10;
  --edge:#aaa;--edge-hover:#4a90c4;
  --handle:#e8a44a;--handle-off:#bbb;--handle-stroke:#888;
  --accent:#4a90c4;--accent-text:#1a5a8a;
  --bar-bg:rgba(245,245,245,0.92);
  --export-bg:#fff;--export-shadow:rgba(0,0,0,0.15);
  --input-bg:#f0f0f0;
  --tooltip-bg:#fff;--tooltip-border:#ccc;--tooltip-text:#555;
  --grid:#e0e0e0;
}
@media(prefers-color-scheme:dark){
:root{
  --bg:#111;--bg2:#1e1e1e;--bg3:#1a1a1a;
  --fg:#ccc;--fg2:#aaa;--fg3:#666;
  --border:#333;--border2:#444;
  --node-fill:#1a3a5c;--node-stroke:#2a6aaa;--node-text:#7bb8e8;
  --node-hover:#244a6a;--node-src:#2a6aaa;--node-src-stroke:#7bb8e8;
  --node-sel:#8a7020;--node-sel-stroke:#c89a10;
  --edge:#555;--edge-hover:#5a9fd4;
  --handle:#e8a44a;--handle-off:#444;--handle-stroke:#888;
  --accent:#7bb8e8;--accent-text:#7bb8e8;
  --bar-bg:rgba(17,17,17,0.92);
  --export-bg:#1a1a1a;--export-shadow:rgba(0,0,0,0.6);
  --input-bg:#111;
  --tooltip-bg:#222;--tooltip-border:#444;--tooltip-text:#bbb;
  --grid:#2a2a2a;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;background:var(--bg);color:var(--fg);display:flex;flex-direction:column}
.toolbar-row{display:flex;gap:6px;padding:4px 12px;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0}
.toolbar-row:first-child{padding-top:8px}
.toolbar-row:last-of-type{padding-bottom:8px}
.toolbar-row button,.toolbar-row select{font-family:inherit;font-size:12px;padding:4px 10px;background:transparent;color:var(--fg2);border:1px solid var(--border2);border-radius:6px;cursor:pointer;transition:all .15s}
.toolbar-row button:hover,.toolbar-row select:hover{background:var(--bg);color:var(--fg)}
.toolbar-row .active{background:var(--node-fill);color:var(--accent-text);border-color:var(--node-stroke)}
.toolbar-row label{font-size:11px;color:var(--fg3);display:flex;align-items:center;gap:4px;cursor:pointer}
.toolbar-row input[type="number"]{font-family:inherit;font-size:12px;width:48px;padding:3px 6px;background:var(--input-bg);color:var(--fg);border:1px solid var(--border2);border-radius:4px}
.toolbar-row input[type="checkbox"]{cursor:pointer}
.toolbar-row .sel-count{font-size:11px;color:var(--accent-text);min-width:70px}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
#canvas{width:100%;height:100%;cursor:crosshair;background:var(--bg2)}
#info-bar{position:absolute;bottom:0;left:0;right:0;background:var(--bar-bg);border-top:1px solid var(--border);padding:6px 12px;font-size:12px;color:var(--fg3);display:flex;gap:16px;flex-wrap:wrap;backdrop-filter:blur(8px)}
#info-bar .label{color:var(--fg3)}
#deg-seq{color:var(--accent-text)}
#stats{color:var(--fg2)}
#hint{color:var(--fg3);margin-left:auto}
#export-box{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--export-bg);border:1px solid var(--border2);border-radius:10px;padding:16px;width:min(650px,92vw);z-index:10;box-shadow:0 20px 60px var(--export-shadow)}
#export-box h3{font-size:13px;color:var(--fg2);margin-bottom:8px;font-weight:500}
#export-box textarea{width:100%;height:260px;font-family:inherit;font-size:11px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--fg);resize:vertical}
#export-box .ebar{display:flex;gap:8px;margin-top:8px}
#export-box button{font-family:inherit;font-size:12px;padding:5px 14px;background:transparent;color:var(--fg2);border:1px solid var(--border2);border-radius:6px;cursor:pointer}
#export-box button:hover{background:var(--bg)}
.tooltip{position:absolute;background:var(--tooltip-bg);color:var(--tooltip-text);font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--tooltip-border);pointer-events:none;z-index:5;white-space:nowrap}
</style>
</head>
<body>

<div class="toolbar-row">
  <button id="btn-vertex" class="active" title="Click to place (1)">+ Vertex</button>
  <button id="btn-edge" title="Click two vertices (2)">+ Edge</button>
  <button id="btn-move" title="Drag vertices (3)">Move</button>
  <button id="btn-bend" title="Drag midpoints (4)">Bend</button>
  <button id="btn-delete" title="Click to remove (5)">Delete</button>
  <button id="btn-select" title="Click vertices to select (6)">Select</button>
  <div class="sep"></div>
  <button id="btn-export">Export data</button>
  <button id="btn-export-tikz">Export TikZ</button>
  <button id="btn-export-img">Export image</button>
  <button id="btn-clear">Clear</button>
</div>

<div class="toolbar-row">
  <label><input type="checkbox" id="chk-grid"> Grid snap</label>
  <label>Size: <input type="number" id="inp-grid-size" value="30" min="10" max="100" step="5"></label>
  <div class="sep"></div>
  <span class="sel-count" id="sel-count"></span>
  <button id="btn-sel-all">Select all</button>
  <button id="btn-desel">Deselect</button>
  <div class="sep"></div>
  <button id="btn-add-cycle" title="Add straight edges between consecutive selected vertices">Add cycle edges</button>
</div>

<div id="canvas-wrap">
  <svg id="canvas"></svg>
  <div id="info-bar">
    <span><span class="label">Deg seq: </span><span id="deg-seq">—</span></span>
    <span id="stats"></span>
    <span id="hint">Click canvas to add a vertex</span>
  </div>
</div>

<div id="export-box">
  <h3 id="export-title">Export</h3>
  <textarea id="export-text" readonly></textarea>
  <div class="ebar">
    <button id="btn-copy">Copy</button>
    <button id="btn-close-export">Close</button>
  </div>
</div>

<script>
// ==========================================================================
// DOM REFERENCES
// ==========================================================================
const svg = document.getElementById('canvas');
const degSeqEl = document.getElementById('deg-seq');
const statsEl = document.getElementById('stats');
const hintEl = document.getElementById('hint');
const exportBox = document.getElementById('export-box');
const exportTitle = document.getElementById('export-title');
const exportText = document.getElementById('export-text');
const chkGrid = document.getElementById('chk-grid');
const inpGridSize = document.getElementById('inp-grid-size');
const selCountEl = document.getElementById('sel-count');

function cv(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ==========================================================================
// APPLICATION STATE
// Vertex ids and edge ids use separate counters to avoid any confusion.
// ==========================================================================
let mode = 'vertex';
let vertices = [];         // {id, x, y, label}
let edges = [];            // {id, u, v, mx, my} — u,v are vertex ids
let selected = new Set();  // selected vertex ids
let nextVId = 1;           // vertex id counter (only for vertices)
let nextEId = 1;           // edge id counter (only for edges)
let edgeSrc = null;
let dragV = null;
let dragOff = {x:0, y:0};
let dragBend = null;
let hoveredV = null;
let hoveredE = null;
let tooltip = null;
const R = 10;

// ==========================================================================
// GRID SNAPPING
// ==========================================================================
function snapToGrid(x, y) {
  if (!chkGrid.checked) return {x, y};
  const gs = parseInt(inpGridSize.value) || 30;
  return { x: Math.round(x / gs) * gs, y: Math.round(y / gs) * gs };
}

// ==========================================================================
// DEGREE COMPUTATION
// Counts edges incident to a vertex by its internal id.
// ==========================================================================
function getDeg(vid) {
  let d = 0;
  for (let i = 0; i < edges.length; i++) {
    if (edges[i].u === vid || edges[i].v === vid) d++;
  }
  return d;
}

// ==========================================================================
// SELECTION MANAGEMENT
// ==========================================================================
function updateSelCount() {
  selCountEl.textContent = selected.size > 0 ? `${selected.size} selected` : '';
}

document.getElementById('btn-sel-all').onclick = () => {
  vertices.forEach(v => selected.add(v.id));
  updateSelCount(); render();
};
document.getElementById('btn-desel').onclick = () => {
  selected.clear(); updateSelCount(); render();
};

// ==========================================================================
// ADD CYCLE EDGES
// Adds straight edges between consecutive selected vertices in circular
// order (sorted by angle from centroid). Closes the cycle by connecting
// the last vertex back to the first. Existing edges are never duplicated
// or removed.
// ==========================================================================
document.getElementById('btn-add-cycle').onclick = () => {
  if (selected.size < 2) return;

  const sel = vertices.filter(v => selected.has(v.id));

  // Compute centroid of selected vertices
  let cx = 0, cy = 0;
  sel.forEach(v => { cx += v.x; cy += v.y; });
  cx /= sel.length; cy /= sel.length;

  // Sort by angle from centroid
  sel.sort((a, b) => {
    return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx);
  });

  // Add straight edges between consecutive vertices (and close the cycle)
  const n = sel.length;
  for (let i = 0; i < n; i++) {
    const u = sel[i].id;
    const v = sel[(i + 1) % n].id;
    if (edges.some(e => (e.u === u && e.v === v) || (e.v === u && e.u === v))) continue;
    edges.push({ id: nextEId++, u, v, mx: null, my: null });
  }

  render();
};

// ==========================================================================
// VERTEX RELABELING — keeps labels contiguous after deletion
// ==========================================================================
function relabel() {
  vertices.forEach((v, i) => { v.label = 'v' + (i + 1); });
}

// ==========================================================================
// MODE MANAGEMENT
// ==========================================================================
function setMode(m) {
  mode = m; edgeSrc = null;
  document.querySelectorAll('.toolbar-row button').forEach(b => {
    if (b.id.startsWith('btn-') &&
        !['btn-export','btn-export-tikz','btn-export-img','btn-clear',
          'btn-sel-all','btn-desel','btn-add-cycle'].includes(b.id))
      b.classList.remove('active');
  });
  const el = document.getElementById('btn-' + m);
  if (el) el.classList.add('active');
  svg.style.cursor = ({vertex:'crosshair',edge:'pointer',move:'grab',bend:'pointer',delete:'pointer',select:'pointer'})[m] || 'default';
  hintEl.textContent = ({
    vertex: 'Click canvas to add a vertex',
    edge: 'Click a vertex to start an edge, then another to finish',
    move: 'Drag vertices to reposition',
    bend: 'Drag the handle on any edge to curve it. Double-click to reset.',
    delete: 'Click a vertex or edge to delete',
    select: 'Click vertices to select/deselect. Then use Add cycle edges.'
  })[m] || '';
}

// ==========================================================================
// TOOLBAR HANDLERS
// ==========================================================================
document.getElementById('btn-vertex').onclick = () => setMode('vertex');
document.getElementById('btn-edge').onclick = () => setMode('edge');
document.getElementById('btn-move').onclick = () => setMode('move');
document.getElementById('btn-bend').onclick = () => setMode('bend');
document.getElementById('btn-delete').onclick = () => setMode('delete');
document.getElementById('btn-select').onclick = () => setMode('select');
document.getElementById('btn-clear').onclick = () => {
  vertices = []; edges = []; nextVId = 1; nextEId = 1; edgeSrc = null;
  selected.clear(); updateSelCount(); render();
};
document.getElementById('btn-export').onclick = doExport;
document.getElementById('btn-export-tikz').onclick = doExportTikZ;
document.getElementById('btn-export-img').onclick = doExportImage;
document.getElementById('btn-copy').onclick = () => {
  exportText.select();
  navigator.clipboard.writeText(exportText.value).then(() => {
    document.getElementById('btn-copy').textContent = 'Copied!';
    setTimeout(() => document.getElementById('btn-copy').textContent = 'Copy', 1500);
  });
};
document.getElementById('btn-close-export').onclick = () => exportBox.style.display = 'none';
chkGrid.onchange = () => render();
inpGridSize.onchange = () => { if (chkGrid.checked) render(); };

// ==========================================================================
// EXPORT DATA
// ==========================================================================
function doExport() {
  const deg = {};
  vertices.forEach(v => deg[v.id] = 0);
  edges.forEach(e => { deg[e.u] = (deg[e.u]||0) + 1; deg[e.v] = (deg[e.v]||0) + 1; });
  const vList = vertices.map(v => v.label).join(', ');
  const eList = edges.map(e => {
    const a = vertices.find(v => v.id === e.u), b = vertices.find(v => v.id === e.v);
    return a && b ? `(${a.label}, ${b.label})` : '';
  }).filter(Boolean).join('\n');
  const seq = vertices.map(v => (deg[v.id]||0)).sort((a, b) => b - a);
  const adj = vertices.map(v => {
    const nbrs = [];
    edges.forEach(e => {
      if (e.u === v.id) { const w = vertices.find(x => x.id === e.v); if (w) nbrs.push(w.label); }
      if (e.v === v.id) { const w = vertices.find(x => x.id === e.u); if (w) nbrs.push(w.label); }
    });
    return `${v.label}: ${nbrs.join(', ')}`;
  }).join('\n');
  exportTitle.textContent = 'Export data';
  exportText.value = `Vertices (${vertices.length}): ${vList}\n\nEdges (${edges.length}):\n${eList}\n\nDegree sequence: ${condensed(seq)}\n\nAdjacency list:\n${adj}`;
  exportBox.style.display = 'block';
}

// ==========================================================================
// EXPORT TikZ
// ==========================================================================
function doExportTikZ() {
  if (!vertices.length) return;
  const SCALE = 50;
  const tc = (x, y) => `(${(x/SCALE).toFixed(2)}, ${(-y/SCALE).toFixed(2)})`;

  // Compute degree sequence for caption
  const degs = vertices.map(v => getDeg(v.id)).sort((a, b) => b - a);
  const seqStr = condensed(degs);

  let t = '';
  t += '% Generated by Graph Visualizer\n';
  t += '% https://github.com/xchyn/graph-visualizer\n\n';
  t += '\\documentclass{article}\n';
  t += '\\usepackage{tikz}\n\n';
  t += '\\begin{document}\n\n';
  t += '\\begin{figure}[h]\n';
  t += '\\centering\n';
  t += '\\begin{tikzpicture}[\n';
  t += '  every node/.style={circle, draw, fill=blue!15, inner sep=1pt, minimum size=14pt, font=\\small},\n';
  t += '  every edge/.style={draw, thick}\n';
  t += ']\n\n';
  t += '% Vertices\n';
  for (const v of vertices) t += `\\node (${v.label}) at ${tc(v.x,v.y)} {${getDeg(v.id)}};\n`;
  t += '\n% Edges\n';
  for (const e of edges) {
    const a = vertices.find(v => v.id === e.u), b = vertices.find(v => v.id === e.v);
    if (!a || !b) continue;
    if (e.mx != null) {
      const midX=(a.x+b.x)/2, midY=(a.y+b.y)/2;
      const dx=e.mx-midX, dy=e.my-midY;
      const edx=b.x-a.x, edy=b.y-a.y;
      const cross=edx*dy-edy*dx, dist=Math.hypot(dx,dy), eLen=Math.hypot(edx,edy);
      const ang=Math.round(Math.atan2(dist,eLen/2)*180/Math.PI);
      t += `\\draw (${a.label}) edge[bend ${cross>0?'right':'left'}=${ang}] (${b.label});\n`;
    } else {
      t += `\\draw (${a.label}) -- (${b.label});\n`;
    }
  }
  t += '\n% Vertex labels\n';
  for (const v of vertices) t += `\\node[draw=none, fill=none, above=2pt, font=\\tiny] at ${tc(v.x,v.y)} {${v.label}};\n`;
  t += '\n\\end{tikzpicture}\n';
  t += `\\caption{Degree sequence: $${seqStr}$, $|V|=${vertices.length}$, $|E|=${edges.length}$.}\n`;
  t += '\\end{figure}\n\n';
  t += '\\end{document}\n';
  exportTitle.textContent = 'Export TikZ/LaTeX';
  exportText.value = t;
  exportBox.style.display = 'block';
}

// ==========================================================================
// EXPORT IMAGE (PNG) — always light theme
// ==========================================================================
function doExportImage() {
  if (!vertices.length) return;
  const pad=40;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for (const v of vertices){x0=Math.min(x0,v.x-R);y0=Math.min(y0,v.y-R);x1=Math.max(x1,v.x+R);y1=Math.max(y1,v.y+R);}
  for (const e of edges){if(e.mx!=null){const cp=getControlPoint(e);if(cp){x0=Math.min(x0,cp.x);y0=Math.min(y0,cp.y);x1=Math.max(x1,cp.x);y1=Math.max(y1,cp.y);}x0=Math.min(x0,e.mx);y0=Math.min(y0,e.my);x1=Math.max(x1,e.mx);y1=Math.max(y1,e.my);}}
  x0-=pad;y0-=pad;x1+=pad;y1+=pad;
  const w=x1-x0,h=y1-y0;
  const bg='#fff',nf='#d0e4f5',ns='#4a90c4',nt='#1a5a8a',ec='#aaa',fc='#999';
  const degs=vertices.map(v=>getDeg(v.id)).sort((a,b)=>b-a);
  const seqStr='Degree sequence: '+condensed(degs)+'    |V|='+vertices.length+'  |E|='+edges.length;
  const lh=28;
  let s=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h+lh}" viewBox="${x0} ${y0-lh} ${w} ${h+lh}">`;
  s+=`<rect x="${x0}" y="${y0-lh}" width="${w}" height="${h+lh}" fill="${bg}"/>`;
  s+=`<text x="${x0+w/2}" y="${y0-8}" text-anchor="middle" font-family="SF Mono,Consolas,monospace" font-size="13" fill="${fc}">${seqStr}</text>`;
  for(const e of edges){const a=vertices.find(v=>v.id===e.u),b=vertices.find(v=>v.id===e.v);if(!a||!b)continue;const cp=getControlPoint(e);if(cp)s+=`<path d="M${a.x},${a.y} Q${cp.x},${cp.y} ${b.x},${b.y}" fill="none" stroke="${ec}" stroke-width="2"/>`;else s+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${ec}" stroke-width="2"/>`;}
  for(const v of vertices){const d=getDeg(v.id);s+=`<circle cx="${v.x}" cy="${v.y}" r="${R}" fill="${nf}" stroke="${ns}" stroke-width="1.5"/>`;s+=`<text x="${v.x}" y="${v.y}" text-anchor="middle" dominant-baseline="central" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="600" fill="${nt}">${d}</text>`;s+=`<text x="${v.x}" y="${v.y-R-6}" text-anchor="middle" font-family="SF Mono,Consolas,monospace" font-size="10" fill="${fc}">${v.label}</text>`;}
  s+=`</svg>`;
  const sc=2,can=document.createElement('canvas');can.width=w*sc;can.height=(h+lh)*sc;
  const ctx=can.getContext('2d'),img=new Image(),blob=new Blob([s],{type:'image/svg+xml;charset=utf-8'}),url=URL.createObjectURL(blob);
  img.onload=()=>{ctx.drawImage(img,0,0,can.width,can.height);URL.revokeObjectURL(url);can.toBlob(pb=>{const a=document.createElement('a');a.href=URL.createObjectURL(pb);a.download='graph.png';a.click();URL.revokeObjectURL(a.href);},'image/png');};
  img.src=url;
}

// ==========================================================================
// CONDENSED DEGREE SEQUENCE
// ==========================================================================
function condensed(seq) {
  if (!seq.length) return '—';
  const parts = []; let i = 0;
  while (i < seq.length) {
    let j = i;
    while (j < seq.length && seq[j] === seq[i]) j++;
    parts.push((j-i) > 1 ? `${seq[i]}^${j-i}` : `${seq[i]}`);
    i = j;
  }
  return '(' + parts.join(', ') + ')';
}

// ==========================================================================
// COORDINATE CONVERSION
// ==========================================================================
function pt(e) {
  const r = svg.getBoundingClientRect();
  const ct = e.touches ? e.touches[0] : e;
  return { x: ct.clientX - r.left, y: ct.clientY - r.top };
}

// ==========================================================================
// HIT TESTING
// ==========================================================================
function hitV(p) {
  return vertices.find(v => Math.hypot(v.x - p.x, v.y - p.y) < R + 4);
}

function getHandlePos(e) {
  const a = vertices.find(v => v.id === e.u), b = vertices.find(v => v.id === e.v);
  if (!a || !b) return null;
  if (e.mx != null) return { x: e.mx, y: e.my };
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

/** Bézier control point from on-curve midpoint: CP = 2*M - (A+B)/2 */
function getControlPoint(e) {
  const a = vertices.find(v => v.id === e.u), b = vertices.find(v => v.id === e.v);
  if (!a || !b || e.mx == null) return null;
  return { x: 2 * e.mx - (a.x + b.x) / 2, y: 2 * e.my - (a.y + b.y) / 2 };
}

function hitBendHandle(p) {
  for (const e of edges) { const m = getHandlePos(e); if (m && Math.hypot(m.x-p.x,m.y-p.y) < 10) return e; }
  return null;
}

function pointToEdgeDist(p, e) {
  const a = vertices.find(v => v.id === e.u), b = vertices.find(v => v.id === e.v);
  if (!a || !b) return Infinity;
  const cp = getControlPoint(e);
  if (cp) {
    for (let t = 0; t <= 1; t += 0.02) {
      const x=(1-t)*(1-t)*a.x+2*(1-t)*t*cp.x+t*t*b.x;
      const y=(1-t)*(1-t)*a.y+2*(1-t)*t*cp.y+t*t*b.y;
      if (Math.hypot(p.x-x,p.y-y) < 8) return 0;
    }
    return Infinity;
  }
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);
  if (len<1) return Infinity;
  const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(len*len)));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}

function hitE(p) {
  for (const e of edges) { if (pointToEdgeDist(p,e) < 8) return e; }
  return null;
}

// ==========================================================================
// RENDERING
// ==========================================================================
function render() {
  const nodeFill=cv('--node-fill'),nodeStroke=cv('--node-stroke'),nodeText=cv('--node-text');
  const nodeHover=cv('--node-hover'),nodeSrc=cv('--node-src'),nodeSrcStroke=cv('--node-src-stroke');
  const nodeSel=cv('--node-sel'),nodeSelStroke=cv('--node-sel-stroke');
  const edgeCol=cv('--edge'),edgeHovCol=cv('--edge-hover');
  const handleCol=cv('--handle'),handleOff=cv('--handle-off'),handleStroke=cv('--handle-stroke');
  const gridColor=cv('--grid');

  let html = '';
  const showHandles = (mode === 'bend');

  // Grid
  if (chkGrid.checked) {
    const gs=parseInt(inpGridSize.value)||30, rect=svg.getBoundingClientRect();
    for (let x=0;x<=rect.width;x+=gs) html+=`<line x1="${x}" y1="0" x2="${x}" y2="${rect.height}" stroke="${gridColor}" stroke-width="0.5"/>`;
    for (let y=0;y<=rect.height;y+=gs) html+=`<line x1="0" y1="${y}" x2="${rect.width}" y2="${y}" stroke="${gridColor}" stroke-width="0.5"/>`;
  }

  // Edges
  for (const e of edges) {
    const a=vertices.find(v=>v.id===e.u), b=vertices.find(v=>v.id===e.v);
    if (!a||!b) continue;
    const col=(hoveredE===e)?edgeHovCol:edgeCol;
    const cp=getControlPoint(e);
    if (cp) html+=`<path d="M${a.x},${a.y} Q${cp.x},${cp.y} ${b.x},${b.y}" fill="none" stroke="${col}" stroke-width="2"/>`;
    else html+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${col}" stroke-width="2"/>`;
    if (showHandles) {
      const h=getHandlePos(e);
      if (h) html+=`<circle cx="${h.x}" cy="${h.y}" r="5" fill="${e.mx!=null?handleCol:handleOff}" stroke="${handleStroke}" stroke-width="1" style="cursor:grab"/>`;
    }
  }

  // Vertices
  for (const v of vertices) {
    const d = getDeg(v.id);
    const isHov=(hoveredV===v), isSrc=(edgeSrc===v.id), isSel=selected.has(v.id);
    let fill, stroke;
    if (isSrc) { fill=nodeSrc; stroke=nodeSrcStroke; }
    else if (isSel) { fill=nodeSel; stroke=nodeSelStroke; }
    else if (isHov) { fill=nodeHover; stroke=edgeHovCol; }
    else { fill=nodeFill; stroke=nodeStroke; }
    const sw=(isSrc||isSel)?2.5:1.5;
    html+=`<circle cx="${v.x}" cy="${v.y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    html+=`<text x="${v.x}" y="${v.y}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="${isSel?'#333':nodeText}" style="pointer-events:none;font-family:inherit">${d}</text>`;
  }

  svg.innerHTML = html;
  updateInfo();
}

function updateInfo() {
  if (!vertices.length) { degSeqEl.textContent='—'; statsEl.textContent=''; return; }
  const degs=vertices.map(v=>getDeg(v.id)).sort((a,b)=>b-a);
  degSeqEl.textContent=condensed(degs);
  statsEl.textContent=`|V|=${vertices.length}  |E|=${edges.length}`;
}

// ==========================================================================
// TOOLTIP
// ==========================================================================
function showTooltip(v, p) {
  removeTooltip();
  tooltip=document.createElement('div'); tooltip.className='tooltip'; tooltip.textContent=v.label;
  tooltip.style.left=(p.x+14)+'px'; tooltip.style.top=(p.y-8)+'px';
  document.getElementById('canvas-wrap').appendChild(tooltip);
}
function removeTooltip() { if (tooltip) { tooltip.remove(); tooltip=null; } }

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>render());

// ==========================================================================
// POINTER EVENTS
// ==========================================================================
svg.addEventListener('pointerdown', e => {
  const p = pt(e);

  if (mode === 'vertex') {
    const snapped = snapToGrid(p.x, p.y);
    vertices.push({ id: nextVId++, x: snapped.x, y: snapped.y, label: 'v' + vertices.length });
    // Relabel all to ensure sequential naming
    relabel();
    render();

  } else if (mode === 'edge') {
    const h = hitV(p); if (!h) return;
    if (!edgeSrc) {
      edgeSrc = h.id; render();
      hintEl.textContent = `Edge from ${h.label} — click another vertex`;
    } else {
      if (h.id !== edgeSrc && !edges.some(e => (e.u===edgeSrc&&e.v===h.id)||(e.v===edgeSrc&&e.u===h.id)))
        edges.push({ id: nextEId++, u: edgeSrc, v: h.id, mx: null, my: null });
      edgeSrc = null; render();
      hintEl.textContent = 'Click a vertex to start an edge';
    }

  } else if (mode === 'move') {
    const h = hitV(p);
    if (h) { dragV=h; dragOff={x:h.x-p.x,y:h.y-p.y}; svg.style.cursor='grabbing'; svg.setPointerCapture(e.pointerId); }

  } else if (mode === 'bend') {
    const h = hitBendHandle(p);
    if (h) { dragBend=h; svg.setPointerCapture(e.pointerId); svg.style.cursor='grabbing'; }

  } else if (mode === 'delete') {
    const hv = hitV(p);
    if (hv) {
      selected.delete(hv.id);
      edges = edges.filter(e => e.u !== hv.id && e.v !== hv.id);
      vertices = vertices.filter(v => v.id !== hv.id);
      relabel(); updateSelCount(); render(); return;
    }
    const he = hitE(p);
    if (he) { edges = edges.filter(e => e.id !== he.id); render(); }

  } else if (mode === 'select') {
    const h = hitV(p);
    if (h) {
      if (selected.has(h.id)) selected.delete(h.id);
      else selected.add(h.id);
      updateSelCount(); render();
    }
  }
});

svg.addEventListener('pointermove', e => {
  const p = pt(e);
  if (dragV) {
    const snapped = snapToGrid(p.x+dragOff.x, p.y+dragOff.y);
    dragV.x=snapped.x; dragV.y=snapped.y; render(); return;
  }
  if (dragBend) { dragBend.mx=p.x; dragBend.my=p.y; render(); return; }
  const oldHV=hoveredV, oldHE=hoveredE;
  hoveredV=hitV(p); hoveredE=(!hoveredV)?hitE(p):null;
  if (hoveredV!==oldHV||hoveredE!==oldHE) render();
  if (hoveredV) showTooltip(hoveredV,p); else removeTooltip();
});

svg.addEventListener('pointerup', () => {
  if (dragV) { dragV=null; svg.style.cursor='grab'; }
  if (dragBend) { dragBend=null; svg.style.cursor='pointer'; }
});

svg.addEventListener('dblclick', e => {
  if (mode === 'bend') {
    const p=pt(e), h=hitBendHandle(p);
    if (h && h.mx!=null) { h.mx=null; h.my=null; render(); }
  }
});

// ==========================================================================
// KEYBOARD SHORTCUTS
// ==========================================================================
document.addEventListener('keydown', e => {
  if (exportBox.style.display==='block') { if (e.key==='Escape') exportBox.style.display='none'; return; }
  if (e.key==='1') setMode('vertex');
  if (e.key==='2') setMode('edge');
  if (e.key==='3') setMode('move');
  if (e.key==='4') setMode('bend');
  if (e.key==='5') setMode('delete');
  if (e.key==='6') setMode('select');
  if (e.key==='Escape') { edgeSrc=null; selected.clear(); updateSelCount(); render(); }
});

render();
</script>
</body>
</html>
